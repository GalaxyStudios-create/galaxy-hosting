<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Биткоин Кликер 2.0</title>
    <style>
        /* Анимации */
        @keyframes float-up { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-80px); opacity: 0; } }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 10px #ff9900; } 50% { box-shadow: 0 0 25px #ffc400; } }
        @keyframes scroll-bg { from { background-position: 0 0; } to { background-position: 0 -200px; } }

        /* Общие стили */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #0d0d0d;
            color: #f0f0f0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            user-select: none;
            overflow: hidden;
        }
        body::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(to right, rgba(255,153,0,0.1) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,153,0,0.1) 1px, transparent 1px);
            background-size: 40px 40px; animation: scroll-bg 10s linear infinite; z-index: -1;
        }
        input, button {
            font-family: inherit;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 1em;
            outline: none;
        }
        button { cursor: pointer; background-color: #ff9900; color: #1a1a1a; font-weight: bold; transition: all 0.2s ease; }
        button:hover:not(:disabled) { background-color: #ffb700; transform: translateY(-2px); }
        button:disabled { background-color: #555; color: #888; cursor: not-allowed; }

        /* Экран входа */
        #login-screen {
            background-color: rgba(43, 43, 43, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0,0,0,0.7);
            border: 1px solid #444;
            text-align: center;
        }
        #login-screen h1 { color: #ff9900; margin-top: 0; }
        #login-screen input { width: 100%; box-sizing: border-box; margin: 15px 0; background: #222; color: #fff; border: 1px solid #555; }
        #login-screen button { width: 100%; }

        /* Основной контейнер игры */
        #game-container {
            display: none; /* Скрыт по умолчанию */
            width: 95%;
            max-width: 500px; /* Компактный размер */
            height: 90vh;
            max-height: 800px;
            background-color: rgba(43, 43, 43, 0.95);
            border: 1px solid #444;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
        }

        /* Верхняя часть (кликер) */
        .clicker-zone {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
        }
        .header-stats { text-align: center; }
        .header-stats p { margin: 2px 0; color: #ccc; }
        .header-stats #balance { font-size: 2em; color: #fff; margin: 5px 0; word-break: break-all; }
        .coin {
            width: 150px; height: 150px; /* Уменьшили монету */
            background: linear-gradient(45deg, #ffc400, #ff9900);
            border-radius: 50%;
            border: 6px solid #b36b00;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            margin: 20px 0;
            transition: transform 0.1s ease;
        }
        .coin:active { transform: scale(0.95); }
        .coin-symbol { font-size: 70px; font-weight: bold; color: #fff; text-shadow: 1px 1px 4px #000; }
        .floating-number { position: absolute; font-size: 1.5em; font-weight: bold; color: #ffc400; text-shadow: 0 0 5px black; pointer-events: none; animation: float-up 1.5s ease-out forwards; }
        #logout-button { position: absolute; top: 15px; right: 15px; background: #444; color: #ccc; padding: 8px 12px; font-size: 0.8em; }

        /* Нижняя часть (панель управления) */
        .control-panel { border-top: 2px solid #444; background: #222; border-radius: 0 0 13px 13px; }
        .tabs { display: flex; }
        .tab-button {
            flex: 1; background: #333; color: #aaa; border-radius: 0; padding: 15px;
            border-bottom: 3px solid transparent;
        }
        .tab-button.active { background: #2b2b2b; color: #ff9900; border-bottom-color: #ff9900; }
        .panels { padding: 20px; height: 35vh; overflow-y: auto; }
        .panel { display: none; }
        .panel.active { display: block; }

        /* Стили для контента панелей */
        .upgrade-item { display: flex; justify-content: space-between; align-items: center; background: #333; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .upgrade-item button { width: 120px; flex-shrink: 0; }
        .upgrade-title { font-weight: bold; } .upgrade-stats { font-size: 0.8em; color: #aaa; }
        button.can-afford { animation: pulse-glow 2s infinite ease-in-out; }
        
        #rebirth-panel p { margin: 10px 0; }
        #leaderboard-list { list-style: none; padding: 0; }
        #leaderboard-list li { background: #333; padding: 10px; border-radius: 5px; margin-bottom: 5px; display: flex; justify-content: space-between; font-size: 0.9em; }
        #leaderboard-list li span:first-child { font-weight: bold; color: #ff9900; }
        
        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: #2b2b2b; } ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; } ::-webkit-scrollbar-thumb:hover { background: #ff9900; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>Биткоин Кликер</h1>
        <p>Введите ваше имя для входа или регистрации</p>
        <input type="text" id="username-input" placeholder="Имя игрока">
        <button id="login-button">Войти</button>
    </div>

    <div id="game-container">
        <div class="clicker-zone">
            <button id="logout-button">Выйти</button>
            <div class="header-stats">
                <p>Баланс:</p>
                <h2 id="balance">0.00000000</h2>
                <p>За клик: <span id="click-power">0.00000001</span> | В секунду: <span id="auto-per-second">0.00000000</span></p>
            </div>
            <div id="bitcoin-button" class="coin">
                <span class="coin-symbol">₿</span>
            </div>
        </div>

        <div class="control-panel">
            <div class="tabs">
                <button class="tab-button active" data-tab="upgrades">Улучшения</button>
                <button class="tab-button" data-tab="rebirth">Перерождение</button>
                <button class="tab-button" data-tab="leaderboard">Лидерборд</button>
            </div>
            <div class="panels">
                <div id="upgrades-panel" class="panel active">
                    <!-- Улучшения будут здесь -->
                </div>
                <div id="rebirth-panel" class="panel">
                    <h3>Сброс прогресса ради силы</h3>
                    <p>Перерождение сбросит ваши BTC и улучшения, но навсегда увеличит ВЕСЬ доход.</p>
                    <p>Текущий бонус: <span id="rebirth-multiplier">x1</span></p>
                    <hr>
                    <p>Стоимость: <strong id="rebirth-cost" style="color: #ffc400;">0.10000000</strong> BTC</p>
                    <button id="rebirth-button">Переродиться</button>
                </div>
                <div id="leaderboard-panel" class="panel">
                    <h3>Лучшие майнеры</h3>
                    <ol id="leaderboard-list">
                        <!-- Лидеры будут здесь -->
                    </ol>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
